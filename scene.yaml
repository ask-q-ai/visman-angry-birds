- id: controller
  context: canvas
  type: circle
  position:
    x: "{{ 112 - ((@vm.vx - 360) * 0.15) }}"
    y: "{{ 252 - ((@vm.vy + 320) * 0.10) }}"
  size:
    radius: 12
  showWhen:
    "@vm.canLaunch": true
    "@vm.gameOver": false
  style:
    fillStyle: "#E53935"
    strokeStyle: "#7F1D1D"
    lineWidth: 2
  callbacks:
    onClick: launch
    onHover: aim_to_pointer
    onKeyDown:
      Space: launch
      Enter: launch
      r: restart_game
    onKeyHeld:
      ArrowUp: aim_up
      ArrowDown: aim_down
      ArrowLeft: power_less
      ArrowRight: power_more
  actions:
    aim_up:
      stateMutations:
      - path: vm.vy
        operation: decrement
        value: 10
    aim_down:
      stateMutations:
      - path: vm.vy
        operation: increment
        value: 10
    power_more:
      stateMutations:
      - path: vm.vx
        operation: increment
        value: 10
    power_less:
      stateMutations:
      - path: vm.vx
        operation: decrement
        value: 10
    aim_to_pointer:
      stateMutations:
      - path: vm.vx
        operation: set
        value: "{{ 260 + (112 - @vm.input.pointer.x) * 3.4 }}"
      - path: vm.vy
        operation: set
        value: "{{ -200 - (252 - @vm.input.pointer.y) * 3.0 }}"
    launch:
      spawn:
        template:
          type: circle
          size:
            radius: 11
          style:
            fillStyle: "#E53935"
            strokeStyle: "#3E2723"
            lineWidth: 2
          physics:
            kinematic: true
            bodyType: dynamic
            vx: "{{ @vm.vx }}"
            vy: "{{ @vm.vy }}"
            ay: 900
            bounce: 0.22
            friction: 0.24
            drag: 0.02
            destroyOutOfBounds: true
            bounds:
              minX: -100
              maxX: 760
              minY: -140
              maxY: 420
          effects:
            trail: smoke-trail
            onDestroy: burst
          collision:
            collisionGroups:
            - bird
            collidesWith:
            - structure
            - pig
            - ground
      stateMutations:
      - path: vm.birdsLeft
        operation: decrement
        value: 1
      - path: vm.canLaunch
        operation: set
        value: "{{ (@vm.birdsLeft > 0) && !@vm.gameOver }}"
      - path: vm.gameStarted
        operation: set
        value: true
    restart_game:
      restart: true
