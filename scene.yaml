- id: game-manager
  context: canvas
  type: circle
  position:
    x: -80
    y: -80
  size:
    radius: 1
  style:
    fillStyle: rgba(0,0,0,0)
    strokeStyle: rgba(0,0,0,0)
    lineWidth: 0
  callbacks:
    onInterval:
      seconds: 0.1
      action: tick
  actions:
    tick:
      stateMutations:
      - path: vm.victory
        operation: set
        value: "{{ (!@vm.pig1Alive) && (!@vm.pig2Alive) && (!@vm.pig3Alive) }}"
      - path: vm.defeat
        operation: set
        value: "{{ (@vm.birdsLeft <= 0) && (@vm.pig1Alive || @vm.pig2Alive || @vm.pig3Alive)
          }}"
      - path: vm.gameOver
        operation: set
        value: "{{ @vm.victory || @vm.defeat }}"
      - path: vm.canLaunch
        operation: set
        value: "{{ (@vm.birdsLeft > 0) && !(@vm.victory || @vm.defeat) }}"
- id: restart-key-manager
  context: canvas
  type: circle
  position:
    x: -60
    y: -60
  size:
    radius: 1
  style:
